body:
  text: 嗣法門人大悅等編上堂住貴州安南太平山萬壽禪院上堂師拈拄杖指法座云者寶華王座高而廣廓虛空包不住低而微小諸人覷不著今日當陽獨露看位上座如何施設喝一喝便升拈香云此一瓣香參天地之化育奪日月之光華熱向金爐祝筵今上皇帝萬歲萬歲萬萬歲伏願龍基永固弘開億萬之皇圖聖化流芳普潤三千之世界次拈香云此瓣香根深蒂固浩劫培來葉秀枝昌多生種就奉為滿朝文武闔國公卿常為架海金梁永作擎天玉柱復拈香云此瓣香普坪室中痛遭毒手靜隱堂前親承辣棒當年種就禍胎今向人天吐露熱向爐中供養蘭溪堂上本師月幢了老和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象衆當觀第一義僧問高登寶座四衆歸崇法令初行將何垂示師云金剛圈子人須跳栗棘蓬兒要汝吞進云家家自有通霄路不向他人行處行師云腳跟下好與三十棒問達磨未來東土二祖不往西天將甚麼作單傳的旨師云驢事不起馬事發進云恁麼則和尚別有指示麼師云好事不出門惡事傳千里問一念不生全體見三心莫測事如何師云自從撞著吹燈老直至而今恨未消進云脫體風流成見事抓沙抵水未為奇師云劍為不平離寶匣藥因救病出金瓶進云恁麼則眼空四大海腹納五須彌師畫圓相云吞吐者箇看僧擬議師便打乃豎拄杖云位上座識性莽鹵不通佛法文字不明善惡因果單提者條拄杖佛來也打祖來也打只要斷盡天下人命根不知是何心行諸人還知山僧為人落處麼良久卓一卓云饒伊縱有擒龍志者裏那容捋虎鬚浴佛上堂兜率何年得道毗嵐園中顯妙靈山會上拈花惹得傍人恥笑付甚麼涅槃妙心設許多經律論教不肖遠孫今不管伊長與短直把惡水驀頭澆佛債祖冤一齊報大照禪人請上堂僧問譬如暗中寶無燈不可見寶則不無喚甚麼作燈師云待汝覓得時卻與你道僧喝師便打乃云天有燈覆物高明地有燈海嶽清寧君王有燈天下太平公卿有燈祿位高增庶民有燈福壽康寧衲僧有燈接物利生諸人且道如何是燈卓拄杖云識取鉤頭意莫認定盤星康熙辛丑歲重興松巋請上堂松巋峰頂挺百尺之喬松摩天接日落泊澗中環千旬之帶水印月虛涵一片白雲舒卷幾竿翠竹搖煙風杉弄韻唱無生之妙諦鸚鵡能語歌般若之真詮頭頭顯露法法皆明體用全彰事理俱備諸人於此薦得始知劫外風光便是當人境界其或未然卓拄杖一下云內院復闢參慈氏樓閣重開接善財聖珍談居士轉藏請上堂一卷無字真經明明白白展在諸人面前動口即乖舉眼即錯敢問大衆作麼生念良久以拂子打圓相云一大藏教盡是山僧轉卻了也還信得及麼如或未然且向木魚頭邊聽取喝一喝下座臘八暻圓禪人請上堂烏啼霜夜月梅綻嶺頭春紅塵浩浩地誰是出頭人宗風出衆一喝師云者一喝是甚麼意宗云請和尚道師便打宗云如何是巋山境師云怪石儼然獰似虎蒼松曲幹勢如龍宗云如何是境中人師云棒喝似雷奔宗云人境不立請師別道師卓拄杖一下乃云一點明星燦碧霄瞿曇一見眼豁開饒伊證得寂滅樂雪榻依然長緑苔風颯颯雨篩篩一旦風光化作灰法罷香殘人散去老僧獨自守虛齋昭覺師翁書至上堂舉起書云看看者公案乃是昭覺老漢親手判來位上座不敢隱藏特與諸人通箇消息還會麼萬籟有聲聞不及孤巖無耳卻知音禮萬佛懺上堂建法幢懸法幟迥超格外吹法螺擊法鼓掩耳偷聆一瞻一禮自起自倒千佛萬佛誰後誰先漸次門中不舍一法實際理地豈受些塵既爾顯實開權必須主賓回互打成一片事理圓融但有參差便生漏逗雖然如是且接物利生一句作麼生道有水皆含月無山不帶雲四月八恆暲禪人請上堂今值釋迦降誕大衆請吾慶讚説法無處啓口握條拄杖何幹喚作佛法墮地獄如箭不喚作佛法墮地獄如箭還委悉麼卓拄杖云動容揚古路不墮悄然機宗風上座入山設齋呈衲衣上堂舉僧問香林如何是衲衣下事林云臘月火燒山師云者僧大似負一簷古董縵天索價香林不是買主就地還錢怎奈一事不成兩物見在今有問山僧如何是衲衣下事只向他道寒時寒殺闍黎熱時熱殺闍黎且道山僧與古人是同是別天巖禪人請上堂有時恁麼把斷要津不通凡聖有時不恁麼指鹿為馬證龜成鱉有時不恁麼中恁麼拈一莖草作丈六金身有時恁麼中不恁麼將丈六金身作一莖草且道恁麼底是不恁麼底是依俙似曲才堪聽又被風吹別調中住普安州慈雲山普祥禪院忠順營孚世龍檀越請上堂新開梵剎慈雲山纍及山僧杖指南公案既圓不再舉羡君隻手建精藍問答罷乃云山僧素性簡直力薄才疏秖宜居山自了那堪領衆行道無耐請主龍公拽向荊棘林中無可回避秪得有條攀條無條攀例遂以拄杖畫圓相云三世諸佛以此超凡入聖歷代祖師以此接物利生山僧今日以此闡揚宗教見前大衆以此頓悟玄機者裏薦得千了百當更不須向鬼窟中作活計其或未然更聽饒舌舉昔有婆子供一庵主常令二八女子給侍一日令女抱住云正恁麼時如何主云枯木倚寒巖三冬無暖氣女舉似婆婆云我三十年秪供養箇俗漢遂遣出燒卻菴師云婆子雖具出格手眼怎奈平地喫交者僧非是具實而陳總為皮下無血若是山僧當女子抱住云正恁麼時如何但與他痛捏一下云切忌妄通消息管教婆子大興供養山僧與麼批判還有漏逗也無檢點得出許具參學眼如或未能不是一番寒徹骨怎得梅花噴鼻香小參中秋小參明月當空耀碧天冰輪環轉映寒泉四維上下無遮障萬里山河在目前小參心本無生法何有滅生滅兩俱空洞明如皎月擬更問消息拄杖驀頭楔小參無毛鷂子奔西東鐵柱牽蜓拽高峰跛足蝦蟆天外叫泥鰍合眼跳虛空內有一句大用全提檢點得出參學事畢大覺大聞二居士請小參師豎拂子云者個怪物白如漆黑如雪無頭無尾似綿似鐵劫火不能燒浩劫無淪滅一揮遍界絶塵埃祕密玄機俱漏泄分明不值半文錢多少英豪被他惑遂擲拂子云將來拋向糞掃堆頭看是何人拾得咦千眼大悲覷不見八臂那吒豈能掇值雨小參春雨淋漓久日陰深溪浸爛石頭根蒼苔徑滑行人鈍失足因忙自喪身腳頭腳底須珍重穩步歸家罷問津天一首座請小參未出方丈早到法堂不登曲床敷揚已竟更要老僧道箇甚麼衆中設有疑情未釋者看看咳嗽一聲拽拄杖歸方丈晚參近日常住事繁未曾將此事與衆弟兄商量此時稍間不免落草盤桓去也試問諸人穿衣喫飯屙屎放尿迎賓待客運水搬柴承誰恩力者裏定當得出敢保是箇操學上士稍涉擬意臘月三十到來恰如落湯螃蟹那時莫怪山僧不道各宜勉力松月禪人請小參舉楊岐示衆云薄福住楊岐年來氣力衰寒風吹敗葉猶喜故人歸囉囉哩哩拈起死柴頭且向無煙火師云山僧雖是他家兒孫爭耐家風各別薄福住松巋家貧無著錐衲子望巖退長年靜打隈地爐燒松火熱豆爆寒灰自倒還自起嘯傲白雲堆自明剃髮請小參直按毗盧頂橫將惡水澆烏黑一頭髮雪白兩面刀恩愛從此斷生死當下超真是師子兒出窟便咆哮師母難日監院請小參耳順殘春病質衰四肢沒力手難抬利生懶上空王殿説法愁登彔木臺眼飽肚飢因齒缺頭前腳後為誰呆兩目昏花流冷淚殘身贏弱似枯柴百事艱為難作主懨懨終日守虛齋自嘆老來全沒用恰如死了未曾埋小參舉定山與夾山同行定山云生死中無佛則無生死夾山云生死中有佛則不迷生死師云一箇墮於偏見一箇落於斷常未審二老是何心行山僧分上本無生死説甚麼迷悟遇佛也打遇祖也打何故忤逆兒孫理當如是且道山僧與古人相去幾何易分雪裏粉難辨墨中煤挂鐘普陌營自知隴居士請小參者物純鋼造就生鐵鑄成久經大冶紅爐煆出一身光彩而今高懸堂前毫無隱晦扣之即應撞之即鳴雖假良匠鋾鎔妙用本來具足者裏若能透得不獨報檀那信念亦且不負自己靈明設若遲疑當面錯過遂拈椎連撞三下云鐘槌舉處君須薦莫把家聲特地埋大禪禪人請小參舉南泉一日兩堂爭貓泉提起貓云道得即不斬衆無語泉將貓斬卻至晚舉似趙州州脫草鞋頭頂而出泉云子若在卻救得貓兒師云南泉雖具格外手眼秪有斬貓刀且無活人劍趙州縱然超群拔萃賊過安槍若是具眼雲水正在提貓之時有箇向前但以手作鵓鳩嘴云呱呱呱管取當下得箇活貓那有者些絡索佛成道日審實禪人請小參舉大覺忞示衆云臘八喫香齋腹充自解懷天然成見事何用苦安排師云見成茶飯雖則滿盤托出爭奈美食不中飽人喫山僧則不然臘八喫絡粥充飢又止渴冷暖便自知全不假思索大家隨分納些些莫把醍醐為毒藥慶雲監院請小參今朝九月九風光無別有梧桐早落葉此日值殘秋水冷草木枯風寒稼穡收籬畔舒金菊長空挂玉鉤人境兩俱寂照用一齊周分明成見事莫向別追求然雖如是欲窮千里目更上一重樓示衆示衆真智如如不湛不搖法身歷歷無垢無淨頭頭顯妙法法皆真若論即心即佛也是迷頭認影若論非心非佛未免忘前失後所以道隔林見煙知是火隔墻見角知是牛秪如水底魚蹤空中鳥迹又且如何覓捕豎拂子云摩泥妙寶原無價要識真金火裏看除夕示衆經年歲夜守虛軒且剔殘燈待曉天人世紙錢燒不盡山僧野興樂悠然從他爆竹聲聲碎任我生柴漸漸添報到亥時交子位舊年去了又新年示衆百年三萬六千日反復原來是者漢且道者漢是阿誰狀元本是天生定莫把馮京作馬涼示衆倚天長劍孰當鋒聖諦凡情總沒蹤片月獨涵秋水淨蟾聲歷歷大千同示衆橫開豎劈銀山鐵壁絶遮欄倒弄顛拈伏虎降龍非分外且看山僧鼻孔在甚麼處咄咄咄示衆囫圇一箇子撒出滿乾坤非大亦非小無古亦無今大則包天地小則不容針隱顯隨收放高低任縱橫若能親薦得便是箇中人參示衆威音王已前衆生成佛威音王以後佛成衆生正當威音王時且道佛與衆生成箇甚麼苦瓜連根苦甜瓜徹蒂甜示衆春日蝙和百鳥啼桃紅李白花滿枝分明露盡深深意會得原來是祖機示衆翠竹黃花便是祖師西來大意青山緑水無非諸佛淨妙法身歷歷全彰明明顯露為甚當面錯過不自領會秪因悟入桃園裏竟到如今尚未歸示衆舉那吒拆骨還父析肉還母然後見木身為父母説法師云那吒四大分張百骸散盡未審末後將箇甚麼作本身出為父母説法良久云萬古碧潭空界月再三撈摝始應知機緣僧參次師云那裏來僧曰雞足師云曾見迦葉麼僧曰見師云即今在甚麼處僧擬議師打云何曾夢見僧問祖意教意是同是別師云鳧頸短鶴足長僧曰還許學人領會得麼師豎拂子云疑則別參師經行次召首座云山僧有一語汝試道看座便掌師云三十年弄馬騎今朝被驢撲座一喝師便打座拂袖便出僧問如何是無生法忍師云汝者一問從那裏得來進云何得瞞人師云腳跟下好與三十棒圍爐次師撥火云正恁麼時如何一僧作向火勢一僧作怕勢師云焦頭爛額似粟如麻以撥火棍一齊打散僧問正法眼藏人人具涅槃妙心那箇無為甚麼迦葉受世尊之囑師云刺腦入膠盆進云直饒解得拈花旨也落時人第二機師云高鑑入室僧問如何是和尚親切為人處師便打曰打則任打要且無為人處師連棒打出僧參次師舉筆云識得者箇麼僧喝師便掌僧繞一匝師云風力所轉師問宗風出門三十棒入門三十棒汝作麼生領略宗震威一喝師便打宗云一棒一喝古人舊案如何是和尚家風師亦打宗云鯨鱗躍處千尋浪鐵馬嘶聲振大千師云間言語宗拂袖便行師問僧二六時中將何作主僧罔措師云汝每日穿衣喫飯主也不識一日初侍者與師捏背師曰汝今日捏著老僧痛處初無語師打云切莫辜負老僧師問天眼如何是汝本來面目眼云不知師云日用而不知且道不知底是箇甚麼眼忙然師豎拳云莫是者箇眼作禮師云參僧呈牧牛頌師徵云牛在甚麼處僧作牽牛勢師云莫弄虛頭師問恆暲汝隨侍多年還摸著老僧鼻孔也未暲禮拜師云會得作禮會不得作禮暲起身側立師云去善一參師問那裏來一云安順師云腳跟未動時好與三十棒一遽喝師驀拈棒一連喝兩喝拂袖便出僧參次師云甚處來曰不離當下師云那裏去曰秪到者裏師云饒汝踏破芒鞋還未知腳跟下消息在僧便喝師云不念遠來好與三十棒僧問譬如暗中寶無燈不可見燈則不無喚甚麼作寶師云失居士問世尊出世且置拈花意旨作麼舉師云對面不相識冤殺老瞿曇進云春色報來花蕊綻碧天雲盡月輪孤師云切莫錯會進云自從奪得驪珠後直至於今牛事無師云幸遇居士法語示天眉禪人禪和子須識本有一段風光莫教自己當下埋沒拈香撥火無非總是道場秪要返照回光便見本來面目不須更向鬼窟裏作活計還委悉麼著破鐵鞋無覓處得來全不費工夫示堪為禪人參禪一事不是易為必要死下念頭將一句無意味話頭蘊在胸中行住坐臥深起疑情切莫間斷日夕參究猛然一下迸破疑團絲毫無礙豈不快暢示達道王居士居士索吾法語山僧儘力道不出箇元字腳秪得舉則古公案示教利喜昔僧問趙州萬法歸一一歸何處州云我在青州作領布衫重七斤向者裏薦得不被天下老和尚羅籠如或未然二六時中努力參究示恆智禪人操學智者提持向上一著必須發大勇猛起大精進向日用間忙之際審究動轉施為喜怒哀樂是箇甚麼消息於此薦得許爾赤肉團上有箇無位真人放光動地設若不能到頭霜夜月任運落前溪示審實禪人指頭大箇禪虛空包不住舉起示汝參恁麼莫恍惚咄咄咄六六原來三十六示淺又禪人此事不是口説便了必要打起精神努力參去直將好惡長短是非得失輥作一團日久歲深忽然得箇分曉來向老僧手中喫棒始得示窮心禪人汝為生死來參山僧未曾動步時看舉念者是誰既到者裏不免與汝下箇注腳日用而不知且道不知箇甚麼向此著力參究有日築著磕著豁然得箇消息不枉腳頭喫苦珍重示天骨禪人山僧昔年向黑漆桶裏摸得一面古鏡今日大破慳囊親付與汝貯在無事甲裏急須早晚用力拂拭他日現出箇大光明藏照天照地莫忘老朽口吧吧地示恆暲禪人參學人不可墮在無事甲裏空度時光必須緊把生死二字貼在額顱上十二時中深下疑情疑到疑而不疑不疑自疑田地忽得分曉原來是者箇消息示天眼禪人學道人如划船相似直教努力一篙篙著實撑上急水灘頭直到汪洋平蕩之際始得任意優遊豈不快然自在也珍重法嗣聖目率比丘大修大壽太俊聖旨聖忠聖鑑聖海聖眼居士等同刻法嗣如純重編分對海鹽陳子蘭書楞嚴夏維寧倪爾繩同鐫康熙丁亥季夏旦嘉興楞嚴寺般若堂藏板
