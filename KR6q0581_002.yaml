body:
  text: 嗣法門人大悅等編頌古世尊拈花信手拈來絶計量當機覿面索承當飲光若是英靈者必不明明入𤐰湯二祖立雪本分安間不自間無端雪裏立人前饒君覓得安心法失卻娘生一臂全臨濟痛棒禍福無門口自招烏藤三頓不相饒大愚脅下翻身轉平地波濤萬丈高女子出定出得何如未出時莫教錯過兩行眉而今四海清如許慚愧當年七佛師十智同真溪山雲月自古同詎分南北與西東頓開鐵面誰相委一曲陽春詠不窮倩女離魂淡煙濃粉作新裝賣畫風流猶是狂若遇知音親道破腥臊何得污諸方藥山升座月桂長空觸處明何緣照眼似迷程雪中薦得寒梅意始許枝頭幾度春雲巖掃地次道吾云太區區生巖云須知有不區區者吾云恁麼則有弟二月也巖提起掃帚云這箇是第幾月吾便休去玄沙云正是第二月雲門云奴見婢殷勤但將一語勘知音窄處拶人難卓針就裏撥開間影像長空突出月孤明百鳥銜花孤峰深鎖碧雲中兀坐寥寥一懶融百鳥不來由自適遊人徒妄覓形蹤南泉三不是四面洪濤萬丈深拶身無路亦無門就中掣斷黃金鎖不是愁人亦斷魂拈香撥火覿面相逢不識他只因錯過苦婆娑拈香撥火如親薦觸處逢渠唱哩囉仰山指雪獅子云還有過得此色者麼雲門云當時便與推倒雪竇云只解推倒不解扶起紅非血兮白非銀徹骨寒梅占小春推倒扶起間著力清風明月往來新主人公當機覿面無人識擬意思量路轉岐識得其中些子意拈頭作尾復何疑四偈金剛寶劍豈待如何稍涉觸犯血染山河踞地獅子牙鋒爪利不展威獰野狐潛避探竿影草不須徵考未及入門已辨分曉不作喝用顛拈倒弄舉起龜毛全體大用雜著贈本源老宿見訪肩風破浪出煙霞適遇紅桃幾樹花識得枝頭間意思山僧有語別云沙贈本拙老衲眉間挂劍老闍黎拽杖披雲過野溪行到水窮山盡處與吾扶起碧雲梯贈天一首座宗門九鼎危如卯貴在承當轉用施三要三玄才試舉雷聲發動電光隨示無上禪人去去來來費腳頭芒鞋喫苦路為讎揚眉薦得歸家句信步毗盧頂上遊示升宇大珍談居士施為固必先知因洞達玄微性自真設使一毫生意外靈明覿面莫能親示道成禪德刻期學道最良方唯要恆心莫易常一念時時緊逼拶逢緣觸境自生光普明薑醫士乞偈多年煉就活靈丹起死回生只一丸異症膏肓沾妙劑管教痼病及時痊文林薑居士乞偈入山欲覓無生句貧道原來一法無半夜觸翻逆器了天明任汝説之乎送劍端法兄雲迷古道恨離離就裏寒心獨我知話到識情難別處幾回煙浪動人思送天碧上座住靜清淨法身隨處安何須更要覓深山有時挖斷鋤頭頸握柄歸來報我間送安南衛紫石程護法間來訪我道撫掌呵呵笑桃李花並開拈起呈微妙壽莫檀越王母蟠桃獻上延三多五福慶長年銀琴鐵笛頻相祝壽域崇開不老仙止説黃居士乞偈立心行正道驚策自疑猜時時執起金剛劍大與佛魔戰一回示自戒陳居士自戒堅持宿世因更須驚策堅持人直教持到無持處眼底眉邊挂曉春明濟于居士求偈茆屋深居志若癡如斯自有眼明時山僧無可重開示月在青天水在池贈天眉副寺寶壽生薑辣味奇毒流千古中天眉老僧知汝無情面有病無錢不問伊示天祕禪人金剛圈出老楊岐祕密其中最上機的要發明心地印經行坐臥好提廝示悟空禪人人前每説隔天涯今日重逢勘作家彼此眉橫鼻直豎闍黎何事自周遮贈不易楊醫士利己利人施妙方肱心慈濟盡蓄藏針頭盡施神仙妙只待功成證醫王示海闊馬居士覿面相呈勿外求原來屈指是拳頭若能分別其中意終不騎牛更覓牛示大乘袁居士大乘根器已生來當下無疑趨聖階不落聲聞小果界時時擬近大雄才示大純邵善人佛法大意無多子一念純熟絶較量分明下手無著處古今多少錯承當示大信喻居士大信無疑直下了了然無事樂間身間中莫教等間過時把彌陀念幾聲送笑月侍者入楚省師參方學道入叢林究竟完全只死心此去三湘逢敏手歸來報我遇知音示秀雲禪人前三三與後三三珍重禪人仔細參笑殺從前無著老堂堂覿面自顢頇真秀包居士乞偈愧我平常無一法龜毛豎起用多端饒伊縱具超方眼薦得分明落二三示愛月侍者昔日鳥窩親切意當陽拈起布毛吹只今苦口無他意要汝聲前奪祖機示化月禪人見渠質直無虛偽日用尋常絶正偏鼻祖家風無別妙只須就裏定方圓覓心禪人乞偈覓心無處是心安先德誠言豈等間若解承當此箇事清風皓月映眉端覺悟金居士乞偈非是山僧機不投只因爾念別馳求從今正好將心息勿使浮生空白頭示托禪禪人為人切忌自瞞頇日用尋常當返觀荊棘林中下腳易夜明簾外轉身難示心田禪人心田決志守心城剿盡魔軍四海平內外一如空幻有拈頭作尾示無生示楚禎薑居士一念無私異念休牧牛極要追蹤繇驀然入手貫穿鼻縱步還家任自遊送太守梅臣傳護法憐才治澤動賢情腰佩黃金仲子聲八納風寒留不住輕車三過繞龍城九河江居士索話頭向吾索話頭示汝乾矢橛但直恁麼去自然無分別送梵僧迢迢千萬路程賒杖錫東來禮洛伽盡道西天真極樂闍黎何事慕中華宿南華山夜聞猿啼蓮峰聳翠接長空一枕煙霞寂寞中落落猿聲驚夢醒不知身臥碧雲宮春遊晚歸復及人來韻柳弄青陰曙色嬌林泉深處暗香飄山長路曲歸來晚謾把殘詩對月敲晴山鶯語間雲散盡曉風清日暖花明鳥語新舌巧聲輕無曲調幾回啼破嶺頭春季春日訪祖鼻法兄不遇杖履追尋入石畿層層煙霧鎖柴扉庭前柏子陳年景屋後殘花自落飛嘯天獅子當空危踞露雄峰造物生成勢不同種性曾來無半侶長年獨笑碧雲中廛居厭寂辭山樂市廛鬧烘烘處好盤桓靜中學道非為道動裏參禪方是禪是非場作菩提岸聲色堆為淨法身剎剎塵塵皆大意頭頭法法盡圓明非僧非俗日街遊不作經商豈八流骨董多般都賣盡單單不賣死貓頭消間無事課彌陀百八珠輪不較多本分修行由我得平常日用有檀那山居松巋日用自平常佛法人情俱已忘問道其中端的事冷時向火熱乘涼一住深山是事灰倚林終日枕莓苔清風明月心交友不待相呼自往來睡佛看破衆生塵劫事不勞世念起攀緣放身做箇驢年夢一枕山河伴石眠贈友人新成靜室尖頭茅屋隱松間四壁藝窗對遠山舉世只聞才子貴安知劫外道人間春日次韻寒梅初綻報春還細柳含煙掩竹關自慶不知時節易燒松煮雪傍雲間吟菊次顯和尚原韻籬下英姿秋後芳抱香枝徑自成粧拂衣歸去人先醉隱逸何辭傲晚霜散淡歌疏間道者原無疑孤雲野鶴任東西異迹殊形難定相灰頭土面少人知破蒲團垢衲衣出入隨身任所之行了多少彎曲徑過了多少沒橋溪杖挑風月橫肩上手握乾坤藏袖裏山海為家原不遠天地為廬到處居榮華富貴全無分清虛冷淡自相宜荊棘林中沒絆礙孤峰頂上示威儀嘯月吟風惟自許觀山玩水幾忘疲遊市廛宿旅邸化些油鹽菜蔬米飢餓將來養色軀資持慧命導凡迷身居陋巷不知憂座結高堂未足奇肉案酒樓懸鉢袋柳巷花街歇杖藜混俗和光忘恥辱散淡悠遊樂有餘或住深山坐禪林不貪名利不求榮粗衣淡飯隨時過作事隨緣任縱橫間來趺坐盤陀石無韻山歌任我吟也無嗔也無喜逍遙灑落度日子天子不臣侯不友平生孤介直如斯乾坤生我沒用人我是他非渾不理逢人説些沒味禪見成公案頻拈舉達磨不先我不後布袋長老無彼此非素隱非行怪直入窩巢無內外生死無常沒可了菩提涅盤成一塊任從滄海變桑田我此淨土常不壞報佛恩酬祖債百事俱有高賢在奈豫疏拙只偷安佛法世法無干礙人家笑我好糊言我笑人家不自在分燈宗風大闡口似懸河眼似燈眉間挂劍利無情龜毛兔角親分付鳳子龍兒一任吞天一大悅橫戈躍馬出魔宮生死兩離智眼通鉢袋拈來分付汝任從四海震吾宗普現大行無心無法自優遊一句了然豁兩眸從上源來親授受祖家聲價要君酬天巖大照多年種毒恨冤深幾度沉埋幾度新大治紅爐曾煆煉許君出衆續傳燈天培本照頭角猙獰勢已成何緣終日隱群鱗從今點出雙睛去變化飛騰宇宙新天骨本淨亙古圓明如意珠驪龍領下少人知直拈一顆親分付照徹山河處處宜恆暲聖目法本無傳法已行曹源一滴潤乾坤秪今付汝天涯去隨處拈香咸報恩善一如純幾度遍參不計年來機氣焰逼人天吾今付汝龜毛拂千古聲名續正傳普渡大海多年種下茄與瓜今日拈來個個佳分付闍黎隨處用人天均濟活龍蛇普應法出曹源之至今無傳無受法洪深吾儕今日親分付是處任為功德林青華大全王居士五百餘年運一逢其間奮起振宗風山河鎮靜虛空闊朗朗中天化日紅孚世大倫龍居士臨濟家風孚世緣深開佛日映青蓮而今分付曹溪旨法海周流繼祖傳守一大圓姬居士一念修持許幾年導民育物潔如蓮鹿門心法親拈示永續來源證的傳德雲聖恩龍居士囊劫修身應大唐衣盂曾寄普光堂秪今拈出親傳授砥柱中流紫玉梁秀含六度李居士照世一盞無盡燈光明晃曜滿乾坤吾儕送與滇南子遞代相傳燦古今法派達本無學覺自通照能仁智海紹續真宗塔銘黔南普陽安普連壤有山奇秀前臨滇東後倚關嶺左跨粵西右駕隴北嘉相西來翠松東向峭壁層崟名勝佳焉蓋天造地設為待哲人飛錫浮杯所也雖然厥地為美厥境為偉而無高人達士散花點頭絮沾水印未始不動有心者嘆耳庚子春不意天人作緣松巋有主感善權和尚之至矣權公名達位楚北人也萬曆戊午九月草三日午時育於辰溪父姓瞿母王氏十三歲二親早逝公以方便智度為父母後因兵燹八黔寓安順府禮太虛和尚落髮稟戒日精毗尼次稟寒光和尚圓具領道無高矮之句尋住安南廣福寺適幸蘭溪月幢禪師應請安龍道經廣福權公一見喜自慶焉蓋幢禪師得昭覺丈老人之傳造詣深遠權公堅留參扣即得牧牛法明年進安龍同住隨遷普坪屢次入室機鋒迅捷真有當人不讓之風幢禪師雖未許可然臨濟得其兒孫穎無生死之旨而宗匠會乎歸要三玄三要已探源矣一日幢禪師指水津處驗之公沖口説偈曰石津水汪徹骨清涼一滴盈岸潤流八荒幢師休去隨受總戎陸公君祥請主楞嚴寺開律堂雖雲水日增公猶不自肯決意辭退遷龍場萬壽寺掩關自誓不悟必不出關凝坐數月豁然貫通銀山鐵壁當下粉碎待見蘭溪被詰公案覿面應酬似風轉虛空橫豎無礙始知都盧秪在裏許古今淆訛直下承當有何難哉噫異矣臨濟正脈於權公屈一指矣幢禪師特留分座公不從時陽春撲屋欣然率諸門人杖錫東行時有隱士前郡守許公偕境人談戴衆善姓等觀公道風雅重梵相奇偉於是生信迫切堅留瞻戀不舍公默識其誠從而注錫率衆誅茅闢土躬耕務必首衆親得百丈之真風小參煎點嘗蹈死心之用農務稍暇隨即限期或學者頗鈍是必委屈開導堪雕琢者直以本分鉗鎚公或時云踏著頂𩕳上一著十方世界瓦解冰消且道諸人向甚麼處安身立命鮮有契其機者或謂臨濟而下提唱益高機鋒益峻近日諸方模倣之公獨守平實之旨何也吾竊讀宗門心書道若大路然豈必舍平易而求高險以自苦耶窺公見處以佛祖直指見性為宗古人隨機設施平險高下皆一時權宜豈得已哉不求其本而徇其迹務為穿鑿者公罪人也其上堂小參一味乾曝曝語真古風也頌古贊偈全無文字何異睡虎口吻公平實之名風動邊疆上遊郡邑文武當道每以撥冗談心無不善其道也如安龍鎮臺王公馳書請會渴仰心敬理出常情癸丑冬泉臺張公糧驛參政陳公軍務安南落意入山請益因時未遂猶走書致敬一時從白業明哲賢士皆常與公為方外友再可異者總戎龍公天祐喬梓舉署傾誠頂禮視若六通神冀真慧日普照智月長圓也次而隴北諸營司遙聞道範不遠而來日覲躬參親承記莂宛如鼻祖之風先開六宗沉迷既而震旦直指遐邇仰慕如瞻星月於甲子秋偶示微恙自不為介凡遇參請如常應勉仲秋草日誡真俗門人時當末法各宜精進向上別無一言草三囑侍者聖機曰清淨奉持如老僧在日報恩足矣又謂身心疲倦就枕少憩復起警衆端坐而逝春秋六十有七夏四十有五手度弟子若干衆授戒弟子幾數百人得法而分居列剎者八人居士四人三會語有録成帙公語言雖無潤色亦無枯寂之態公賦性純厚履踐真實如説而行如行而説終身一志是不可奪夏蠟之需隨緣而至隨即供衆不畜長物寂後棺殮之理龍公欣然如子弟之孝父兄無異也喜施塔基於松巋前十里許山川繡錯松相鬱蔥真美境也監院副寺大祥大修大耀等不憚勞苦建立石塔此所藏不朽骸留不磨迹是又天造地設待哲人之歸境也法嗣如純者索銘於豫豫曰未睹其人未履其地烏乎銘哉及觀行實讀全録語恍然若睹其人履其地又烏乎不銘哉盥手焚香敬而銘曰大哉至道無憂無惱樂意自在藥山長笑機心自息法融獨妙不藥不病鉢瓶永笑散花於雨點石魚躍得意忘言慧燈常照面壁得來豎拳悟竅而今而後梅熟龍躍鎮陽蕭登崇沐手拜撰行實師名達位字善權乃楚北人也父姓瞿母王氏生於萬曆戊午九月草三日午時自離襁褓喜睹梵像至冠年一日聞僧誦法華經至有智若聞則能信解之句感發出塵之念時值世變棄家入黔至安順觀音硐禮太虛和尚披剃并受沙彌十戒經兩載辭虛往參含光和尚座下具足光令看父母未生前話久久不契又辭光參月幢和尚一日請益問父母未生前那個是某甲本來面目幢與驀頭一棒云會麼師擬對幢復棒云鈍漢參堂去師自此疑情亦重立誓閉關云設若不明此事決不出關一夜經行至四鼓時昏沉甚重忽倒地上人事罔知久而蘇醒只是手足不能自舉遍體汗流覺得橫身輕快疑情冰釋如放下百斤擔子相似然後出關復省覲幢幢以數十公案驗之師對無疑方承印證師於前後行化所住院名並歸終端緒已載會燈故不復贅世壽六十七僧臘四十五法嗣門人如純撰
